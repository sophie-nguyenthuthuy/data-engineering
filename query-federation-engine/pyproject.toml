[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "query-federation-engine"
version = "0.1.0"
description = "A lightweight query federation engine that executes SQL across Postgres, MongoDB, S3 Parquet, and REST APIs"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "sqlglot>=23.0",
    "pandas>=2.0",
    "pyarrow>=14.0",
    "psycopg2-binary>=2.9",
    "pymongo>=4.6",
    "boto3>=1.34",
    "httpx>=0.27",
    "pyyaml>=6.0",
    "rich>=13.0",
    "s3fs>=2024.2",
    "fastparquet>=2024.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "ruff>=0.3",
    "mongomock>=4.1",
    "moto[s3]>=5.0",
]

[project.scripts]
qfe = "federation.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"
