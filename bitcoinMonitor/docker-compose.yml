services:
  ingest:
    build: .
    command: python -m src.ingest
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - ingest
    restart: unless-stopped
