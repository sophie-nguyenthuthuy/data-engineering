environment: dev  # dev | staging | prod

spark:
  app_name: lakehouse-migration
  master: local[*]           # or yarn / k8s
  executor_memory: 4g
  driver_memory: 2g
  shuffle_partitions: 200
  delta_log_retention_days: 7

catalog:
  type: glue                 # glue | unity | nessie | hive
  database: lakehouse_dev
  warehouse_path: s3://my-bucket/lakehouse/dev

source:
  type: jdbc                 # jdbc | s3 | kafka | snowflake
  url: jdbc:postgresql://legacy-dw:5432/warehouse
  user: "${LEGACY_DB_USER}"
  password: "${LEGACY_DB_PASSWORD}"
  fetch_size: 50000

ingestion:
  watermark_column: updated_at
  batch_size_rows: 500000
  parallelism: 8

layers:
  bronze: s3://my-bucket/lakehouse/dev/bronze
  silver: s3://my-bucket/lakehouse/dev/silver
  gold:   s3://my-bucket/lakehouse/dev/gold

tables:
  - name: transactions
    source_table: public.transactions
    partition_by: [event_date]
    primary_keys: [transaction_id]
    scd_type: 2
  - name: customers
    source_table: public.customers
    partition_by: [country_code]
    primary_keys: [customer_id]
    scd_type: 2
  - name: products
    source_table: public.products
    partition_by: []
    primary_keys: [product_id]
    scd_type: 1
