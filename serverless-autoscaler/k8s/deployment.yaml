apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-autoscaler
  namespace: autoscaler
  labels:
    app: pipeline-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline-autoscaler
  template:
    metadata:
      labels:
        app: pipeline-autoscaler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pipeline-autoscaler
      containers:
        - name: autoscaler
          image: pipeline-autoscaler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: metrics
          env:
            - name: AUTOSCALER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: METRICS_DB_URL
              value: "sqlite:///data/autoscaler_metrics.db"
            - name: PREWARM_LEAD_TIME_SECONDS
              value: "300"
            - name: LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: job-registry
              mountPath: /etc/autoscaler
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: job-registry
          configMap:
            name: job-registry
        - name: data
          persistentVolumeClaim:
            claimName: autoscaler-data
