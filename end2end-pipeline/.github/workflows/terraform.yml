name: terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Which env to plan/apply"
        type: choice
        options: [dev, prod]
        default: dev
      action:
        description: "plan | apply"
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  contents: read
  id-token: write  # OIDC to AWS
  pull-requests: write  # comment plan output

concurrency:
  group: terraform-${{ github.ref }}-${{ inputs.env || 'dev' }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"

jobs:
  fmt-validate:
    name: fmt + validate (all envs)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform fmt -check (recursive)
        run: terraform fmt -check -recursive infra/terraform

      - name: terraform init (no backend)
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: terraform validate

  plan:
    name: plan (dev)
    runs-on: ubuntu-latest
    needs: fmt-validate
    # Only plan when AWS OIDC role is configured as a repo secret.
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    env:
      TF_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        if: vars.AWS_PLAN_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: terraform init
        if: vars.AWS_PLAN_ROLE_ARN != ''
        working-directory: infra/terraform/envs/dev
        run: terraform init -input=false

      - name: terraform plan
        if: vars.AWS_PLAN_ROLE_ARN != ''
        working-directory: infra/terraform/envs/dev
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Upload plan artifact
        if: vars.AWS_PLAN_ROLE_ARN != ''
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/terraform/envs/dev/tfplan
          retention-days: 7

  apply:
    name: apply (manual dispatch)
    runs-on: ubuntu-latest
    needs: fmt-validate
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
    environment: ${{ inputs.env }}
    env:
      TF_ENV: ${{ inputs.env }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: terraform init
        working-directory: infra/terraform/envs/${{ inputs.env }}
        run: terraform init -input=false

      - name: terraform apply
        working-directory: infra/terraform/envs/${{ inputs.env }}
        run: terraform apply -input=false -auto-approve
