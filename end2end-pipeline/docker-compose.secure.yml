# Production-grade stack: SASL_SCRAM-SHA-512 + TLS, Docker secrets, basic-auth Schema Registry.
#
# Run with:   make up-secure
# Prereq:     make bootstrap  (generates secrets/)
#
# The plaintext stack in docker-compose.yml is for local dev only. This file
# is the default for anything that isn't a laptop.

x-common-env: &common-env
  TZ: UTC

# ----------------------------------------------------------------------------
# Docker secrets. Each is a tiny file under ./secrets/, populated by
# scripts/bootstrap-secrets.sh, mounted into the containers that need them.
# ----------------------------------------------------------------------------
secrets:
  ca_crt:
    file: ./secrets/clients/ca.crt
  truststore_p12:
    file: ./secrets/clients/truststore.p12
  truststore_password:
    file: ./secrets/clients/truststore_password

  kafka_keystore_pem:
    file: ./secrets/kafka/kafka.keystore.pem
  kafka_keystore_key:
    file: ./secrets/kafka/kafka.keystore.key
  kafka_truststore_pem:
    file: ./secrets/kafka/kafka.truststore.pem

  producer_password:
    file: ./secrets/clients/producer_password
  producer_jaas:
    file: ./secrets/clients/producer_kafka.jaas

  connect_password:
    file: ./secrets/clients/connect_password
  connect_jaas:
    file: ./secrets/clients/connect_kafka.jaas

  schemaregistry_password:
    file: ./secrets/clients/schemaregistry_password
  schemaregistry_jaas:
    file: ./secrets/clients/schemaregistry_kafka.jaas
  schemaregistry_auth_jaas:
    file: ./secrets/clients/schemaregistry_auth.jaas
  sr_users:
    file: ./secrets/clients/sr_users.properties

  clickhouse_users_xml:
    file: ./secrets/clients/clickhouse_users.xml
  clickhouse_pipeline_password:
    file: ./secrets/clients/clickhouse_pipeline_password
  clickhouse_api_password:
    file: ./secrets/clients/clickhouse_api_password

  # Phase 4 (orchestration): Dagster + MinIO + DLQ-replay Kafka principal.
  replay_password:
    file: ./secrets/clients/replay_password
  minio_root_user:
    file: ./secrets/clients/minio_root_user
  minio_root_password:
    file: ./secrets/clients/minio_root_password

  # Phase 5 (observability): Grafana admin.
  grafana_admin_password:
    file: ./secrets/clients/grafana_admin_password

services:
  # ---------------------------------------------------------------- Kafka
  kafka:
    image: bitnami/kafka:3.7.1
    container_name: kafka
    restart: unless-stopped
    environment:
      <<: *common-env
      # --- KRaft ---
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      # --- Listeners ---
      # INTERNAL (9092) + EXTERNAL (19092) = SASL_SSL. CONTROLLER stays
      # PLAINTEXT (loopback quorum on a single node, not on a real network).
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SASL_SSL,CONTROLLER:PLAINTEXT,EXTERNAL:SASL_SSL
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- SASL ---
      KAFKA_CFG_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-512
      # Bitnami reads CLIENT_USERS/PASSWORDS and provisions SCRAM users at startup.
      KAFKA_CLIENT_USERS: ${KAFKA_CLIENT_USERS}
      KAFKA_CLIENT_PASSWORDS: ${KAFKA_CLIENT_PASSWORDS}
      KAFKA_INTER_BROKER_USER: ${KAFKA_INTER_BROKER_USER}
      KAFKA_INTER_BROKER_PASSWORD: ${KAFKA_INTER_BROKER_PASSWORD}

      # --- TLS (PEM) ---
      KAFKA_TLS_TYPE: PEM
      KAFKA_CERTIFICATE_PASSWORD: ""   # unencrypted PEM key
      KAFKA_TLS_CLIENT_AUTH: none

      # --- Topics / safety ---
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_MIN_INSYNC_REPLICAS: "1"

      # --- Authorization (Phase 3) ---
      KAFKA_CFG_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_CFG_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_CFG_SUPER_USERS: User:${KAFKA_INTER_BROKER_USER}

    ports:
      - "19092:19092"
    volumes:
      - kafka-data:/bitnami/kafka
      - ./secrets/kafka/kafka.keystore.pem:/opt/bitnami/kafka/config/certs/kafka.keystore.pem:ro
      - ./secrets/kafka/kafka.keystore.key:/opt/bitnami/kafka/config/certs/kafka.keystore.key:ro
      - ./secrets/kafka/kafka.truststore.pem:/opt/bitnami/kafka/config/certs/kafka.truststore.pem:ro
    healthcheck:
      # Self-check via the plaintext controller isn't exposed; probe the
      # broker TCP listener and trust SASL if the port answers.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Create the topics we need (auto-create is disabled) and provision ACLs.
  kafka-init:
    image: bitnami/kafka:3.7.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        cat >/tmp/client.properties <<EOF
        security.protocol=SASL_SSL
        sasl.mechanism=SCRAM-SHA-512
        sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_INTER_BROKER_USER}" password="${KAFKA_INTER_BROKER_PASSWORD}";
        ssl.truststore.type=PEM
        ssl.truststore.location=/ca/kafka.truststore.pem
        EOF
        kt=/opt/bitnami/kafka/bin/kafka-topics.sh
        # Data topics.
        for topic in "${KAFKA_TOPIC}" "${KAFKA_DLQ_TOPIC}"; do
          $$kt --bootstrap-server kafka:9092 \
               --command-config /tmp/client.properties \
               --create --if-not-exists \
               --topic $$topic --partitions 3 --replication-factor 1
        done
        # Pre-create _schemas so Schema Registry doesn't need a Create ACL.
        $$kt --bootstrap-server kafka:9092 \
             --command-config /tmp/client.properties \
             --create --if-not-exists \
             --topic _schemas --partitions 1 --replication-factor 1 \
             --config cleanup.policy=compact
        echo "Topics:"
        $$kt --bootstrap-server kafka:9092 --command-config /tmp/client.properties --list
        echo
        echo "Provisioning ACLs..."
        bash /opt/init/acls.sh
    environment:
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC}
      KAFKA_INTER_BROKER_USER: ${KAFKA_INTER_BROKER_USER}
      KAFKA_INTER_BROKER_PASSWORD: ${KAFKA_INTER_BROKER_PASSWORD}
      KAFKA_ACLS_CLIENT_CONF: /tmp/client.properties
    volumes:
      - ./secrets/kafka/kafka.truststore.pem:/ca/kafka.truststore.pem:ro
      - ./infra/kafka/acls.sh:/opt/init/acls.sh:ro
    restart: "no"

  # ---------------------------------------------------------------- Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: backward

      # --- Kafka storage (SASL_SSL) ---
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: SASL_SSL://kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_SSL
      SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: SCRAM-SHA-512
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_LOCATION: /etc/secrets/truststore.p12
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_TYPE: PKCS12
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_PASSWORD_FILE: /run/secrets/truststore_password

      # --- REST basic auth ---
      SCHEMA_REGISTRY_AUTHENTICATION_METHOD: BASIC
      SCHEMA_REGISTRY_AUTHENTICATION_REALM: SchemaRegistry-Props
      SCHEMA_REGISTRY_AUTHENTICATION_ROLES: admin,user

      # Pass JAAS files for both Kafka client + Jetty realm.
      SCHEMA_REGISTRY_OPTS: >-
        -Djava.security.auth.login.config=/etc/secrets/schemaregistry_auth.jaas
    command:
      - bash
      - -c
      - |
        set -e
        # Build kafkastore JAAS from mounted password.
        PW=$$(cat /run/secrets/schemaregistry_password)
        cat >/tmp/kafkastore.jaas <<EOF
        KafkaClient {
          org.apache.kafka.common.security.scram.ScramLoginModule required
          username="schemaregistry"
          password="$$PW";
        };
        EOF
        export SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG="org.apache.kafka.common.security.scram.ScramLoginModule required username=\"schemaregistry\" password=\"$$PW\";"
        # Put users.properties where Jetty expects (per the auth JAAS).
        cp /run/secrets/sr_users /etc/schema-registry/users.properties
        exec /etc/confluent/docker/run
    ports:
      - "8081:8081"
    secrets:
      - truststore_password
      - schemaregistry_password
      - sr_users
    volumes:
      - ./secrets/clients/truststore.p12:/etc/secrets/truststore.p12:ro
      - ./secrets/clients/schemaregistry_auth.jaas:/etc/secrets/schemaregistry_auth.jaas:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u admin:$$(cat /run/secrets/admin_password 2>/dev/null || echo x) http://localhost:8081/subjects || curl -fsS http://localhost:8081/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ---------------------------------------------------------------- Kafka Connect
  kafka-connect:
    build:
      context: ./infra/kafka-connect
      dockerfile: Dockerfile
    image: pipeline/kafka-connect:local
    container_name: kafka-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: "8083"
      CONNECT_GROUP_ID: pipeline-connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: _connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect_statuses
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_BASIC_AUTH_CREDENTIALS_SOURCE: USER_INFO
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO

      # SASL_SSL everywhere a Connect worker talks to Kafka.
      CONNECT_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_SASL_MECHANISM: SCRAM-SHA-512
      CONNECT_SSL_TRUSTSTORE_LOCATION: /etc/secrets/truststore.p12
      CONNECT_SSL_TRUSTSTORE_TYPE: PKCS12
      CONNECT_PRODUCER_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_PRODUCER_SASL_MECHANISM: SCRAM-SHA-512
      CONNECT_PRODUCER_SSL_TRUSTSTORE_LOCATION: /etc/secrets/truststore.p12
      CONNECT_PRODUCER_SSL_TRUSTSTORE_TYPE: PKCS12
      CONNECT_CONSUMER_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_CONSUMER_SASL_MECHANISM: SCRAM-SHA-512
      CONNECT_CONSUMER_SSL_TRUSTSTORE_LOCATION: /etc/secrets/truststore.p12
      CONNECT_CONSUMER_SSL_TRUSTSTORE_TYPE: PKCS12
      CONNECT_ADMIN_SECURITY_PROTOCOL: SASL_SSL
      CONNECT_ADMIN_SASL_MECHANISM: SCRAM-SHA-512
      CONNECT_ADMIN_SSL_TRUSTSTORE_LOCATION: /etc/secrets/truststore.p12
      CONNECT_ADMIN_SSL_TRUSTSTORE_TYPE: PKCS12
    command:
      - bash
      - -c
      - |
        set -e
        PW=$$(cat /run/secrets/connect_password)
        TS_PW=$$(cat /run/secrets/truststore_password)
        SR_PW=$$(cat /run/secrets/connect_password)
        export CONNECT_SSL_TRUSTSTORE_PASSWORD="$$TS_PW"
        export CONNECT_PRODUCER_SSL_TRUSTSTORE_PASSWORD="$$TS_PW"
        export CONNECT_CONSUMER_SSL_TRUSTSTORE_PASSWORD="$$TS_PW"
        export CONNECT_ADMIN_SSL_TRUSTSTORE_PASSWORD="$$TS_PW"
        JAAS="org.apache.kafka.common.security.scram.ScramLoginModule required username=\"connect\" password=\"$$PW\";"
        export CONNECT_SASL_JAAS_CONFIG="$$JAAS"
        export CONNECT_PRODUCER_SASL_JAAS_CONFIG="$$JAAS"
        export CONNECT_CONSUMER_SASL_JAAS_CONFIG="$$JAAS"
        export CONNECT_ADMIN_SASL_JAAS_CONFIG="$$JAAS"
        export CONNECT_VALUE_CONVERTER_BASIC_AUTH_USER_INFO="connect:$$SR_PW"
        exec /etc/confluent/docker/run
    ports:
      - "8083:8083"
    secrets:
      - connect_password
      - truststore_password
    volumes:
      - ./secrets/clients/truststore.p12:/etc/secrets/truststore.p12:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 90s

  # ---------------------------------------------------------------- ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    restart: unless-stopped
    environment:
      <<: *common-env
      # Skip the env-var-based user provisioning — users.xml drives it.
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./secrets/clients/clickhouse_users.xml:/etc/clickhouse-server/users.d/pipeline.xml:ro
      # Phase 5: /metrics on :9363
      - ./infra/observability/clickhouse/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ---------------------------------------------------------------- Producer
  producer:
    build:
      context: ./services/producer
      dockerfile: Dockerfile
    image: pipeline/producer:local
    container_name: producer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      KAFKA_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_SASL_MECHANISM: SCRAM-SHA-512
      KAFKA_SASL_USERNAME: producer
      KAFKA_SASL_PASSWORD_FILE: /run/secrets/producer_password
      KAFKA_SSL_CA_LOCATION: /etc/secrets/ca.crt
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_REGISTRY_USER: producer
      SCHEMA_REGISTRY_PASSWORD_FILE: /run/secrets/producer_password
      PRODUCER_EVENTS_PER_SEC: ${PRODUCER_EVENTS_PER_SEC}
      PRODUCER_ERROR_RATE: ${PRODUCER_ERROR_RATE}
      OTEL_SERVICE_NAME: producer
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      PYTHONUNBUFFERED: "1"
    secrets:
      - producer_password
    volumes:
      - ./schemas:/app/schemas:ro
      - ./secrets/clients/ca.crt:/etc/secrets/ca.crt:ro

  # ---------------------------------------------------------------- API
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: pipeline/api:local
    container_name: api
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT_HTTP: ${CLICKHOUSE_PORT_HTTP}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: api_ro
      CLICKHOUSE_PASSWORD_FILE: /run/secrets/clickhouse_api_password
      CLICKHOUSE_TABLE: ${CLICKHOUSE_TABLE}
      API_PORT: ${API_PORT}
      OTEL_SERVICE_NAME: api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      PYTHONUNBUFFERED: "1"
    ports:
      - "${API_PORT}:${API_PORT}"
    secrets:
      - clickhouse_api_password
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os,sys; urllib.request.urlopen(f'http://localhost:{os.environ[\"API_PORT\"]}/healthz', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------- Dashboard
  dashboard:
    image: nginx:1.27-alpine
    container_name: dashboard
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${DASHBOARD_PORT}:80"
    volumes:
      - ./services/dashboard/www:/usr/share/nginx/html:ro
      - ./services/dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ---------------------------------------------------------------- MinIO
  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      <<: *common-env
      # MinIO natively supports `*_FILE` env variants for root credentials.
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    ports:
      - "${MINIO_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        export MINIO_ROOT_USER=$$(cat /run/secrets/minio_root_user)
        export MINIO_ROOT_PASSWORD=$$(cat /run/secrets/minio_root_password)
        exec sh /opt/init/init.sh
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - ./infra/minio/init.sh:/opt/init/init.sh:ro
    restart: "no"

  # ---------------------------------------------------------------- Dagster
  # Webserver + daemon (single `dagster dev` supervisor). Wires:
  #   - ClickHouse via the read/write `pipeline` user (Docker secret file)
  #   - MinIO with the root cred as an S3 access/secret pair
  #   - Kafka as User:replay over SASL_SSL (DLQ replay job only)
  dagster:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    image: pipeline/orchestrator:local
    container_name: dagster
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      DAGSTER_HOME: /opt/dagster
      # ClickHouse.
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT_HTTP: "8123"
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_PIPELINE_USER: pipeline
      CLICKHOUSE_PIPELINE_PASSWORD_FILE: /run/secrets/clickhouse_pipeline_password
      # MinIO (treat root cred as an access/secret pair; swap for a
      # scoped service account if/when MinIO IAM is introduced).
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_FILE: /run/secrets/minio_root_user
      S3_SECRET_KEY_FILE: /run/secrets/minio_root_password
      S3_BUCKET: ${S3_BUCKET}
      # Kafka (SASL_SSL over the `replay` principal — narrowly scoped).
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC}
      KAFKA_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_SASL_MECHANISM: SCRAM-SHA-512
      KAFKA_SASL_USERNAME: replay
      KAFKA_SASL_PASSWORD_FILE: /run/secrets/replay_password
      KAFKA_SSL_CA_LOCATION: /etc/secrets/ca.crt
      OTEL_SERVICE_NAME: dagster
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      PYTHONUNBUFFERED: "1"
    ports:
      - "${DAGSTER_PORT:-3000}:3000"
    secrets:
      - clickhouse_pipeline_password
      - replay_password
      - minio_root_user
      - minio_root_password
    volumes:
      - dagster-home:/opt/dagster
      - ivy-cache:/root/.ivy2
      - ./secrets/clients/ca.crt:/etc/secrets/ca.crt:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/server_info"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ================== Phase 5: Observability ==================
  # Internal-only: observability containers talk to each other on the docker
  # network and to services via container DNS. Only Grafana is exposed to the
  # host. No auth changes from dev; scope them at the network boundary.

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "${OTEL_OTLP_GRPC_PORT:-4317}:4317"
      - "${OTEL_OTLP_HTTP_PORT:-4318}:4318"
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started

  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo

  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/observability/loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.2.0
    container_name: promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./infra/observability/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=24h"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  # kafka-exporter: SASL_SSL flavor. Uses the `admin` principal (a super-user
  # for the purpose of kafka-exporter's metadata queries — Describe on
  # everything). If tightening further matters, carve a `metrics` principal
  # with cluster:Describe + topic:Describe ACLs.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: kafka-exporter
    restart: unless-stopped
    command:
      - "--kafka.server=kafka:9092"
      - "--web.listen-address=:9308"
      - "--sasl.enabled"
      - "--sasl.mechanism=scram-sha512"
      - "--sasl.username=${KAFKA_INTER_BROKER_USER}"
      - "--sasl.password=${KAFKA_INTER_BROKER_PASSWORD}"
      - "--tls.enabled"
      - "--tls.insecure-skip-tls-verify"
    depends_on:
      kafka:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_LOG_LEVEL: warn
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    secrets:
      - grafana_admin_password
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started

volumes:
  kafka-data:
  clickhouse-data:
  minio-data:
  dagster-home:
  ivy-cache:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
