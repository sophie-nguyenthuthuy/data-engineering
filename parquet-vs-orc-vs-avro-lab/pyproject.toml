[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "parquet-vs-orc-vs-avro-lab"
version = "0.1.0"
description = "From-scratch columnar-format lab: mini Parquet/ORC/Avro encoders + RLE/dictionary/delta encodings + predicate-pushdown stats + benchmark."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "sophie-nguyenthuthuy" }]
keywords = ["columnar", "parquet", "orc", "avro", "rle", "dictionary-encoding", "predicate-pushdown"]
classifiers = ["Development Status :: 4 - Beta"]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "hypothesis>=6.100", "mypy>=1.10", "ruff>=0.5"]

[project.scripts]
povactl = "pova.cli:main"

[project.urls]
Homepage = "https://github.com/sophie-nguyenthuthuy/data-engineering/tree/main/parquet-vs-orc-vs-avro-lab"

[tool.hatch.build.targets.wheel]
packages = ["src/pova"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "SIM", "RUF", "TC"]
ignore = ["E501", "B008", "RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = ["slow: marks tests as slow", "property: hypothesis property tests"]
