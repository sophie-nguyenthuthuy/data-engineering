name: parquet-vs-orc-vs-avro-lab

on:
  push:
    branches: [main]
    paths: ["parquet-vs-orc-vs-avro-lab/**", ".github/workflows/pova.yml"]
  pull_request:
    paths: ["parquet-vs-orc-vs-avro-lab/**", ".github/workflows/pova.yml"]
  workflow_dispatch:

defaults:
  run:
    working-directory: parquet-vs-orc-vs-avro-lab

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - run: python -m ruff check src tests
      - run: python -m ruff format --check src tests
      - run: python -m mypy src
      - run: python -m pytest tests -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t pova:ci parquet-vs-orc-vs-avro-lab
      - run: docker run --rm pova:ci info
