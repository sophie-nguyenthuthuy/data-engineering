[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "reverse-etl"
version = "0.1.0"
description = "Move analytics results back into operational tools (CRM, Slack, Email) on a schedule or trigger"
requires-python = ">=3.11"
readme = "README.md"

[project.scripts]
retl = "src.main:cli"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
