[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "self-describing-data-warehouse"
version = "0.1.0"
description = "A data warehouse where every table describes itself — lineage, quality, freshness, usage, and incidents queryable alongside the data."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.scripts]
sdw = "warehouse.cli.main:main"

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-cov"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"

[tool.setuptools.packages.find]
where = ["."]
include = ["warehouse*", "demo*"]
