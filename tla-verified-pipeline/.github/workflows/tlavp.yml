name: tla-verified-pipeline

on:
  push:
    paths:
      - "tla-verified-pipeline/**"
      - ".github/workflows/tlavp.yml"
  pull_request:
    paths:
      - "tla-verified-pipeline/**"
      - ".github/workflows/tlavp.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tla-verified-pipeline
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: tla-verified-pipeline/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
