name: b-epsilon-tree

on:
  push:
    paths:
      - "b-epsilon-tree/**"
      - ".github/workflows/beps.yml"
  pull_request:
    paths:
      - "b-epsilon-tree/**"
      - ".github/workflows/beps.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: b-epsilon-tree
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: b-epsilon-tree/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests benchmarks
      - name: Test
        run: pytest -q
      - name: Benchmarks (smoke)
        run: python -m benchmarks.bench_write
