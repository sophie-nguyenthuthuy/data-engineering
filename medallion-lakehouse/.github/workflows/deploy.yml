name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: Bundle target to deploy
        type: choice
        options: [dev, staging, prod]
        default: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: ${{ github.event.inputs.target || (startsWith(github.ref, 'refs/tags/v') && 'prod') || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform init -backend-config=backends/${{ env.TARGET }}.tfbackend
          terraform apply -auto-approve -var-file=environments/${{ env.TARGET }}.tfvars
        env:
          TARGET: ${{ github.event.inputs.target || (startsWith(github.ref, 'refs/tags/v') && 'prod') || 'dev' }}

      - uses: databricks/setup-cli@main

      - name: Bundle deploy
        working-directory: databricks
        run: databricks bundle deploy -t ${{ env.TARGET }}
        env:
          TARGET: ${{ github.event.inputs.target || (startsWith(github.ref, 'refs/tags/v') && 'prod') || 'dev' }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Run smoke pipeline
        if: env.TARGET != 'prod'
        working-directory: databricks
        run: databricks bundle run sales_medallion -t ${{ env.TARGET }}
        env:
          TARGET: ${{ github.event.inputs.target || 'dev' }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
