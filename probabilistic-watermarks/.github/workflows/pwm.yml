name: probabilistic-watermarks

on:
  push:
    paths:
      - "probabilistic-watermarks/**"
      - ".github/workflows/pwm.yml"
  pull_request:
    paths:
      - "probabilistic-watermarks/**"
      - ".github/workflows/pwm.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: probabilistic-watermarks
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: probabilistic-watermarks/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests benchmarks
      - name: Test (quick)
        run: pytest -q -m "not calibration"
      - name: Test (calibration)
        run: pytest -q -m "calibration"
      - name: Benchmarks (smoke)
        run: python -m benchmarks.bench_throughput
