name: ivm-nested-aggregates

on:
  push:
    paths:
      - "ivm-nested-aggregates/**"
      - ".github/workflows/ivm.yml"
  pull_request:
    paths:
      - "ivm-nested-aggregates/**"
      - ".github/workflows/ivm.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ivm-nested-aggregates
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: ivm-nested-aggregates/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests benchmarks
      - name: Test
        run: pytest -q
      - name: Bench (smoke)
        run: python -m benchmarks.bench_delta_vs_full
