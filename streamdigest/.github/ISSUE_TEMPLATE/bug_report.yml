name: Bug report
description: Something is broken or behaving unexpectedly.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in as much as you can — partial reports are
        still useful, but a minimal reproduction speeds up triage a lot.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed behavior.
      placeholder: "`streamdigest run` fails with ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands, config, and any minimal input needed.
      render: bash
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: streamdigest version / commit SHA
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 22.04 / ..."
    validations:
      required: true

  - type: input
    id: ollama
    attributes:
      label: Ollama version + model
      placeholder: "ollama 0.3.6, llama3.2:3b"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Include the Prefect flow run log or the CLI output. Redact secrets.
      render: text
