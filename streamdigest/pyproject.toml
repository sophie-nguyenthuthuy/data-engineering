[project]
name = "streamdigest"
version = "0.1.0"
description = "Local-first, orchestrated ingestion + AI enrichment of noisy event streams (GitHub, Gmail, Slack, Linear). dlt + DuckDB + Prefect + Ollama."
requires-python = ">=3.11"
authors = [{ name = "streamdigest" }]
readme = "README.md"

dependencies = [
    "dlt[duckdb]>=1.3.0",
    "duckdb>=1.1.0",
    "prefect>=3.0.0",
    "httpx>=0.27.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    "typer>=0.12.0",
    "rich>=13.7.0",
    "python-dotenv>=1.0.0",
    "pendulum>=3.0.0",
]

[project.optional-dependencies]
gmail = ["imap-tools>=1.6.0"]
slack = ["slack-sdk>=3.27.0"]
linear = []  # uses httpx, already a core dependency
all-sources = ["imap-tools>=1.6.0", "slack-sdk>=3.27.0"]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
]

[project.scripts]
streamdigest = "streamdigest.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["streamdigest"]

[tool.hatch.build.targets.wheel.force-include]
"streamdigest/py.typed" = "streamdigest/py.typed"
"streamdigest/evals/fixtures.json" = "streamdigest/evals/fixtures.json"

[tool.mypy]
python_version = "3.11"
strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
no_implicit_optional = true
files = ["streamdigest"]

[[tool.mypy.overrides]]
module = ["dlt.*", "duckdb.*", "prefect.*", "imap_tools.*", "slack_sdk.*"]
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
