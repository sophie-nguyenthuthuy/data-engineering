name: shuffle-dp-engine

on:
  push:
    branches: [main]
    paths:
      - "shuffle-dp-engine/**"
      - ".github/workflows/sdp.yml"
  pull_request:
    paths:
      - "shuffle-dp-engine/**"
      - ".github/workflows/sdp.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: shuffle-dp-engine

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: python -m ruff check src tests
      - name: Ruff format check
        run: python -m ruff format --check src tests
      - name: Mypy
        run: python -m mypy src
      - name: Pytest (fast)
        run: python -m pytest tests -q -m "not empirical"
      - name: Pytest (empirical)
        if: matrix.python-version == '3.12'
        run: python -m pytest tests -q -m empirical

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t shuffle-dp-engine:ci shuffle-dp-engine
      - name: Smoke test
        run: docker run --rm shuffle-dp-engine:ci info
