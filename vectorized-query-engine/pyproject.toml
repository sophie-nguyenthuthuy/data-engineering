[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vqe"
version = "0.1.0"
description = "Vectorized columnar query execution engine with predicate pushdown, late materialization, and pipeline execution"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "pyarrow>=14.0",
    "numpy>=1.26",
    "sqlglot>=23.0",
    "duckdb>=0.10",
    "tabulate>=0.9",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-benchmark>=4.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
