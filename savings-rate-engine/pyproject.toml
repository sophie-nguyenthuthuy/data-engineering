[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "savings-rate-engine"
version = "0.1.0"
description = "Scheduled scraping + normalization pipeline for Vietnamese bank savings rates"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["vietnam", "banking", "savings", "rates", "scraping"]

dependencies = [
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "requests>=2.31",
    "beautifulsoup4>=4.12",
    "lxml>=5.1",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "apscheduler>=3.10",
    "pandas>=2.2",
    "python-dotenv>=1.0",
    "typer>=0.12",
    "httpx>=0.27",
    "rich>=13.7",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "tenacity>=8.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-httpx>=0.30",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.9",
    "responses>=0.25",
]

[project.scripts]
sre = "savings_engine.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/savings_engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
mypy_path = "src"
ignore_missing_imports = true
