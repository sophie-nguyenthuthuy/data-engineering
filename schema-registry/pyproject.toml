[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "schema-registry"
version = "0.1.0"
description = "Schema Registry with Compatibility Enforcement and Auto-Migration"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "pydantic>=2.7.0",
    "jsonschema>=4.22.0",
    "typer[all]>=0.12.0",
    "rich>=13.7.0",
    "httpx>=0.27.0",
    "aiosqlite>=0.20.0",
    "deepdiff>=7.0.1",
    "jinja2>=3.1.4",
    "PyYAML>=6.0.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.4.0",
]

[project.scripts]
schema-registry = "cli.main:app"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src", "cli"]

[tool.ruff]
line-length = 100
target-version = "py311"
