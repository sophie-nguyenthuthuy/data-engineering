[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "stream-state-backend"
version = "0.1.0"
description = "Persistent, queryable state backend for stream processors"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "msgpack>=1.0.7",
    "sortedcontainers>=2.4",
]

[project.optional-dependencies]
rocksdb = [
    "python-rocksdb>=0.7.0",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "anyio[trio]",
    "sortedcontainers>=2.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ssb"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.envs.default]
features = ["dev"]
