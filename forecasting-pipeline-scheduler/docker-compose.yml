services:
  fps:
    build: .
    image: forecasting-pipeline-scheduler:latest
    command: ["info"]

  fps-bench:
    build: .
    image: forecasting-pipeline-scheduler:latest
    command: ["bench", "--layers", "5", "--width", "4", "--workers", "3"]

  fps-regret:
    build: .
    image: forecasting-pipeline-scheduler:latest
    command: ["regret", "--n-dags", "200", "--layers", "5", "--width", "4", "--workers", "3"]
