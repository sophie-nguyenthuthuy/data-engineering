name: disaggregated-storage-engine

on:
  push:
    paths:
      - "disaggregated-storage-engine/**"
      - ".github/workflows/disagg.yml"
  pull_request:
    paths:
      - "disaggregated-storage-engine/**"
      - ".github/workflows/disagg.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: disaggregated-storage-engine
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: disaggregated-storage-engine/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests benchmarks
      - name: Test (quick)
        run: pytest -q -m "not concurrency"
      - name: Test (concurrency)
        run: pytest -q -m "concurrency"
      - name: Benchmark (smoke)
        run: python -m benchmarks.bench_lookup
