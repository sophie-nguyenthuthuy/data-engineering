<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Systemic Risk Monitor</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --critical: #ff4d4f;
      --high: #fa8c16;
      --medium: #fadb14;
      --info: #1677ff;
      --green: #3fb950;
      --tier1: #1677ff;
      --tier2: #722ed1;
      --tier3: #13c2c2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: .02em; }
    .badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-live { background: #1a3a1a; color: var(--green); border: 1px solid var(--green); }
    .badge-offline { background: #3a1a1a; color: var(--critical); border: 1px solid var(--critical); }
    #stat-bar {
      display: flex;
      gap: 24px;
      margin-left: auto;
    }
    .stat { display: flex; flex-direction: column; align-items: flex-end; }
    .stat-val { font-size: 18px; font-weight: 700; }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: 1fr 220px;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel-title {
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    /* Graph panel spans full height on left */
    #graph-panel {
      grid-row: 1 / 3;
    }
    #graph-svg {
      width: 100%;
      height: 100%;
    }
    /* Metrics sidebar */
    #metrics-panel {
      grid-column: 2;
      grid-row: 1;
      overflow-y: auto;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .metric-row:last-child { border-bottom: none; }
    .metric-lbl { color: var(--muted); }
    .metric-val { font-weight: 600; }
    .risk-bar-wrap { width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .risk-bar { height: 100%; border-radius: 3px; }
    /* Alert panel spans bottom */
    #alert-panel {
      grid-column: 1 / 3;
      grid-row: 2;
    }
    #alert-list {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column-reverse;
    }
    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      animation: fadeIn .4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } }
    .sev-pill {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .sev-CRITICAL { background: #3a0000; color: var(--critical); }
    .sev-HIGH     { background: #2d1700; color: var(--high); }
    .sev-MEDIUM   { background: #2d2700; color: var(--medium); }
    .sev-INFO     { background: #001a3a; color: var(--info); }
    .alert-title  { font-weight: 600; line-height: 1.3; }
    .alert-desc   { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .alert-ts     { margin-left: auto; color: var(--muted); font-size: 10px; flex-shrink: 0; }
    /* Node tooltip */
    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 100;
      max-width: 220px;
    }
    .tooltip-row { display: flex; justify-content: space-between; gap: 16px; }
    .tooltip-lbl { color: var(--muted); }
    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>⚡ Systemic Risk Monitor</h1>
  <span id="conn-badge" class="badge badge-offline">OFFLINE</span>
  <div id="stat-bar">
    <div class="stat"><span class="stat-val" id="s-txs">—</span><span class="stat-lbl">Transactions</span></div>
    <div class="stat"><span class="stat-val" id="s-nodes">—</span><span class="stat-lbl">Institutions</span></div>
    <div class="stat"><span class="stat-val" id="s-cycles" style="color:var(--high)">—</span><span class="stat-lbl">Active Cycles</span></div>
    <div class="stat"><span class="stat-val" id="s-cascade" style="color:var(--critical)">—</span><span class="stat-lbl">Max Cascade</span></div>
  </div>
</header>

<div class="main-grid">
  <!-- Graph -->
  <div class="panel" id="graph-panel">
    <div class="panel-title">Live Interbank Exposure Graph</div>
    <svg id="graph-svg"></svg>
  </div>

  <!-- Metrics -->
  <div class="panel" id="metrics-panel">
    <div class="panel-title">Risk Metrics</div>
    <div id="metrics-body"></div>
  </div>

  <!-- Alerts -->
  <div class="panel" id="alert-panel">
    <div class="panel-title">Alert Feed</div>
    <div id="alert-list"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ── WebSocket ──────────────────────────────────────────────────────────────
const WS_URL = `ws://${location.host}/ws`;
let ws;
let reconnectTimer;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('conn-badge').textContent = 'LIVE';
    document.getElementById('conn-badge').className = 'badge badge-live';
    clearTimeout(reconnectTimer);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'metrics' || msg.type === 'snapshot') {
      handleMetrics(msg.data);
    }
  };
  ws.onclose = () => {
    document.getElementById('conn-badge').textContent = 'OFFLINE';
    document.getElementById('conn-badge').className = 'badge badge-offline';
    reconnectTimer = setTimeout(connect, 3000);
  };
}
connect();

// Also poll REST for graph topology (WebSocket carries metrics only)
async function fetchGraph() {
  try {
    const r = await fetch('/api/graph');
    const data = await r.json();
    updateGraph(data.nodes || [], data.edges || []);
  } catch {}
}
setInterval(fetchGraph, 4000);
fetchGraph();

// ── Metrics rendering ─────────────────────────────────────────────────────
function handleMetrics(m) {
  document.getElementById('s-txs').textContent = (m.tx_count || 0).toLocaleString();
  document.getElementById('s-nodes').textContent = m.node_count || '—';
  document.getElementById('s-cycles').textContent = (m.cycles || []).length;
  const cascade = m.worst_cascade || {};
  document.getElementById('s-cascade').textContent =
    cascade.fraction_failed != null
      ? `${(cascade.fraction_failed * 100).toFixed(0)}%`
      : '—';

  renderMetrics(m);
  renderAlerts(m.recent_alerts || []);
}

function renderMetrics(m) {
  const conc = m.concentration || {};
  const cascade = m.worst_cascade || {};
  const systemic = (m.top_systemic_nodes || []).filter(n => n.is_systemic);

  const rows = [
    { label: 'HHI (concentration)', value: (conc.hhi || 0).toFixed(4),
      bar: conc.hhi || 0, warn: conc.is_concentrated },
    { label: 'Gini coefficient', value: (conc.gini || 0).toFixed(4),
      bar: conc.gini || 0, warn: (conc.gini || 0) > 0.5 },
    { label: 'Dominant institutions',
      value: (conc.top_nodes || []).join(', ') || '—', bar: null },
    { label: 'Active cycles', value: (m.cycles || []).length,
      bar: Math.min(1, (m.cycles||[]).length / 5), warn: (m.cycles||[]).length > 0 },
    { label: 'Systemic nodes', value: systemic.length,
      bar: Math.min(1, systemic.length / 5), warn: systemic.length > 0 },
    { label: 'Worst cascade seed', value: cascade.seed || '—', bar: null },
    { label: 'Cascade spread', value: cascade.fraction_failed != null
        ? `${(cascade.fraction_failed*100).toFixed(1)}%` : '—',
      bar: cascade.fraction_failed || 0, warn: (cascade.fraction_failed||0) > 0.2 },
    { label: 'Exposure at risk',
      value: cascade.exposure_lost != null
        ? `$${(cascade.exposure_lost).toLocaleString(undefined,{maximumFractionDigits:0})}M` : '—',
      bar: null },
    { label: 'Transactions ingested',
      value: (m.tx_count||0).toLocaleString(), bar: null },
    { label: 'Graph edges (net exp.)',
      value: (m.edge_count || 0).toLocaleString(), bar: null },
  ];

  const body = document.getElementById('metrics-body');
  body.innerHTML = rows.map(r => {
    const barColor = r.warn ? 'var(--critical)' : 'var(--info)';
    const barHtml = r.bar != null
      ? `<div class="risk-bar-wrap"><div class="risk-bar" style="width:${Math.min(100, r.bar*100).toFixed(0)}%;background:${barColor}"></div></div>`
      : '';
    return `<div class="metric-row">
      <span class="metric-lbl">${r.label}</span>
      <span style="display:flex;align-items:center;gap:8px">
        ${barHtml}
        <span class="metric-val" style="color:${r.warn?barColor:'var(--text)'}">${r.value}</span>
      </span>
    </div>`;
  }).join('');
}

// ── Alert feed ────────────────────────────────────────────────────────────
const seenAlerts = new Set();
function renderAlerts(alerts) {
  const list = document.getElementById('alert-list');
  alerts.slice().reverse().forEach(a => {
    if (seenAlerts.has(a.alert_id)) return;
    seenAlerts.add(a.alert_id);
    const ts = new Date(a.timestamp * 1000).toLocaleTimeString();
    const el = document.createElement('div');
    el.className = 'alert-item';
    el.innerHTML = `
      <span class="sev-pill sev-${a.severity}">${a.severity}</span>
      <div>
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.description}</div>
      </div>
      <span class="alert-ts">${ts}</span>
    `;
    list.prepend(el);
    // Trim to 80 items
    while (list.children.length > 80) list.removeChild(list.lastChild);
  });
}

// ── D3 Force Graph ────────────────────────────────────────────────────────
const svg = d3.select('#graph-svg');
let simulation;
let gContainer;
let nodeData = [];
let edgeData = [];

function initGraph() {
  svg.selectAll('*').remove();
  gContainer = svg.append('g');

  // Arrow markers
  const defs = svg.append('defs');
  ['#8b949e','#ff4d4f','#fa8c16'].forEach((color, i) => {
    defs.append('marker')
      .attr('id', `arrow-${i}`)
      .attr('viewBox', '0 -4 8 8')
      .attr('refX', 14)
      .attr('refY', 0)
      .attr('markerWidth', 5)
      .attr('markerHeight', 5)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-4L8,0L0,4')
      .attr('fill', color);
  });

  svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', (e) => {
    gContainer.attr('transform', e.transform);
  }));
}

function tierColor(tier) {
  return tier === 'tier1' ? 'var(--tier1)' :
         tier === 'tier2' ? 'var(--tier2)' : 'var(--tier3)';
}

function tierRadius(tier) {
  return tier === 'tier1' ? 14 : tier === 'tier2' ? 10 : 7;
}

function updateGraph(nodes, edges) {
  if (!gContainer) initGraph();
  if (nodes.length === 0) return;

  const rect = document.getElementById('graph-svg').getBoundingClientRect();
  const W = rect.width || 800, H = rect.height || 600;

  // Merge existing positions
  const posMap = {};
  nodeData.forEach(n => posMap[n.id] = { x: n.x, y: n.y });

  nodeData = nodes.map(n => ({
    ...n,
    x: posMap[n.id]?.x ?? (W / 2 + (Math.random() - .5) * 200),
    y: posMap[n.id]?.y ?? (H / 2 + (Math.random() - .5) * 200),
    vx: 0, vy: 0,
  }));
  edgeData = edges;

  const nodeById = Object.fromEntries(nodeData.map(n => [n.id, n]));
  const links = edgeData
    .filter(e => nodeById[e.source] && nodeById[e.target])
    .map(e => ({ ...e, source: nodeById[e.source], target: nodeById[e.target] }));

  // Max exposure for line width scaling
  const maxExp = Math.max(...links.map(l => l.total || 1), 1);

  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodeData)
    .force('link', d3.forceLink(links).id(d => d.id).distance(80).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide().radius(d => tierRadius(d.tier) + 4));

  gContainer.selectAll('*').remove();

  // Edges
  const link = gContainer.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', '#30363d')
    .attr('stroke-width', d => Math.max(1, Math.sqrt(d.total / maxExp) * 5))
    .attr('stroke-opacity', 0.7)
    .attr('marker-end', 'url(#arrow-0)');

  // Nodes
  const node = gContainer.append('g')
    .selectAll('g')
    .data(nodeData)
    .join('g')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.2).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e, d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

  node.append('circle')
    .attr('r', d => tierRadius(d.tier))
    .attr('fill', d => tierColor(d.tier))
    .attr('fill-opacity', 0.85)
    .attr('stroke', '#0d1117')
    .attr('stroke-width', 2);

  node.append('text')
    .attr('dy', d => tierRadius(d.tier) + 10)
    .attr('text-anchor', 'middle')
    .attr('fill', '#8b949e')
    .attr('font-size', '9px')
    .text(d => d.id);

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  node.on('mouseover', (e, d) => {
    tooltip.style.display = 'block';
    tooltip.innerHTML = `
      <div style="font-weight:700;margin-bottom:4px">${d.id}</div>
      <div class="tooltip-row"><span class="tooltip-lbl">Tier</span><span>${d.tier}</span></div>
      <div class="tooltip-row"><span class="tooltip-lbl">Balance</span><span>$${(d.balance||0).toLocaleString(undefined,{maximumFractionDigits:0})}M</span></div>
      <div class="tooltip-row"><span class="tooltip-lbl">Lend capacity</span><span>$${(d.lc||0).toLocaleString(undefined,{maximumFractionDigits:0})}M</span></div>
    `;
  }).on('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
  }).on('mouseleave', () => {
    tooltip.style.display = 'none';
  });

  // Double-click → run contagion simulation
  node.on('dblclick', async (e, d) => {
    e.stopPropagation();
    try {
      const r = await fetch(`/api/simulate/${d.id}`, { method: 'POST' });
      const data = await r.json();
      // Highlight failed nodes
      const failed = new Set([data.seed, ...(data.failed_nodes || [])]);
      node.select('circle').attr('fill', n =>
        n.id === data.seed ? 'var(--critical)' :
        failed.has(n.id) ? 'var(--high)' : tierColor(n.tier)
      );
      setTimeout(() => {
        node.select('circle').attr('fill', n => tierColor(n.tier));
      }, 4000);
      renderAlerts([{
        alert_id: `sim-${Date.now()}`,
        severity: data.fraction_failed > 0.3 ? 'CRITICAL' : 'HIGH',
        category: 'CONTAGION',
        title: `Simulation: ${d.id} failure → ${(data.fraction_failed*100).toFixed(0)}% cascade`,
        description: `${data.failed_count || data.failed_nodes?.length || 0} institutions would fail. Cascade depth: ${data.cascade_depth}. Exposure lost: $${(data.total_exposure_lost||0).toLocaleString(undefined,{maximumFractionDigits:0})}M`,
        affected_nodes: data.failed_nodes || [],
        metrics: data,
        timestamp: Date.now() / 1000,
      }]);
    } catch(err) {
      console.error('Simulation error', err);
    }
  });

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  simulation.alpha(0.3).restart();
}

initGraph();
</script>
</body>
</html>
