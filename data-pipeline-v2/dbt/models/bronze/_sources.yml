      warn_after: {count: 1, period: hour}
      error_after: {count: 6, period: hour}
    tables:
      - name: customers
        columns:
          - name: id
            tests: [not_null, unique]
      - name: products
        columns:
          - name: id
            tests: [not_null, unique]
          - name: sku
            tests: [not_null]
      - name: orders
        columns:
          - name: id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: updated_at
            tests: [not_null]
