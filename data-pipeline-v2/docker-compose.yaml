x-airflow-common: &airflow-common
  build:
    context: ./airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    AIRFLOW_CONN_POSTGRES_ANALYTICS: postgresql://analytics:${ANALYTICS_DB_PASSWORD}@postgres:5432/analytics
    MOCK_API_URL: http://mock-api:8000
    ANALYTICS_DB_URL: postgresql://analytics:${ANALYTICS_DB_PASSWORD}@postgres:5432/analytics
    DBT_PROFILES_DIR: /opt/airflow/dbt
    DBT_PROJECT_DIR: /opt/airflow/dbt
    ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./dbt:/opt/airflow/dbt
  depends_on: &airflow-deps
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: dp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: postgres
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      BI_READ_PASSWORD: ${BI_READ_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-api:
    build: ./mock_api
    container_name: dp_mock_api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: dp_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname admin --lastname admin \
          --role Admin --email admin@example.com || true
        # Install dbt packages so Cosmos can parse the project on DAG load.
        cd /opt/airflow/dbt && dbt deps --profiles-dir /opt/airflow/dbt || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: dp_airflow_web
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      <<: *airflow-deps
      airflow-init:
        condition: service_completed_successfully
      mock-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: dp_airflow_scheduler
    command: scheduler
    depends_on:
      <<: *airflow-deps
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  superset:
    build: ./superset
    container_name: dp_superset
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      BI_READ_PASSWORD: ${BI_READ_PASSWORD}
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - superset_home:/app/superset_home
    restart: unless-stopped

volumes:
  postgres_data:
  superset_home:
