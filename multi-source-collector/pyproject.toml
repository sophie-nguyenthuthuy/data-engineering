[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "multi-source-collector"
version = "0.1.0"
description = "Multi-source data ingestion (HTTP API, CSV, Excel, FTP, Google Sheets) to a staged, naming-convention-enforced zone with manifest-based idempotency."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "sophie-nguyenthuthuy" }]
keywords = ["ingestion", "staging", "naming-convention", "idempotent", "manifest"]
classifiers = ["Development Status :: 4 - Beta"]
dependencies = []

[project.optional-dependencies]
excel = ["openpyxl>=3.1"]
gsheet = ["requests>=2.31"]
dev = [
    "pytest>=8.0", "pytest-cov>=5.0",
    "hypothesis>=6.100", "mypy>=1.10", "ruff>=0.5", "rich>=13.0",
    "openpyxl>=3.1",
]

[project.scripts]
mscctl = "msc.cli:main"

[project.urls]
Homepage = "https://github.com/sophie-nguyenthuthuy/data-engineering/tree/main/multi-source-collector"

[tool.hatch.build.targets.wheel]
packages = ["src/msc"]

[tool.mypy]
python_version = "3.10"
strict = true

[[tool.mypy.overrides]]
module = ["openpyxl.*", "rich.*"]
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "SIM", "RUF", "TC"]
ignore = ["E501", "B008", "RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = ["slow: marks tests as slow", "property: hypothesis property tests", "excel: requires openpyxl"]
