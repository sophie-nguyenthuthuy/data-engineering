name: multi-source-collector

on:
  push:
    branches: [main]
    paths:
      - "multi-source-collector/**"
      - ".github/workflows/msc.yml"
  pull_request:
    paths:
      - "multi-source-collector/**"
      - ".github/workflows/msc.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: multi-source-collector

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: python -m ruff check src tests
      - name: Ruff format check
        run: python -m ruff format --check src tests
      - name: Mypy
        run: python -m mypy src
      - name: Pytest
        run: python -m pytest tests -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t multi-source-collector:ci multi-source-collector
      - name: Smoke test
        run: docker run --rm multi-source-collector:ci info
