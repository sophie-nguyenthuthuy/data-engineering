[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tiered-storage-orchestrator"
version = "0.1.0"
description = "Intelligent data lifecycle system — hot (Redis/Postgres) → warm (Parquet/S3) → cold (compressed archive)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["storage", "data-lifecycle", "redis", "postgres", "s3", "parquet", "tiered-storage"]

dependencies = [
    # Hot tier
    "redis[hiredis]>=5.0",
    "asyncpg>=0.29",
    # Warm tier
    "boto3>=1.34",
    "pyarrow>=15.0",
    # CLI
    "click>=8.1",
    # Utilities
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "fakeredis[aioredis]>=2.21",
    "moto[s3]>=5.0",
    "ruff>=0.4",
    "mypy>=1.9",
]

[project.scripts]
tiered-storage = "cli:cli"

[tool.setuptools.packages.find]
where = ["."]
include = ["tiered_storage*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
