[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "temporal-join-engine"
version = "0.1.0"
description = "AS OF temporal joins for out-of-order event streams with late-arrival corrections"
requires-python = ">=3.10"
license = { text = "MIT" }
readme = "README.md"

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-cov"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["temporal_join"]
